<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sushi Corp Admin Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
  body{background:#111;color:white;}
  #checking{display:flex;align-items:center;justify-content:center;height:100vh;color:#8ea3bd;font-size:14px;}
  #app{display:none;text-align:center;padding-top:100px;}
  #logout-btn{
    margin-top:24px;padding:10px 22px;border:none;border-radius:8px;
    background:linear-gradient(90deg,#00b7ff,#3f8cff);color:#fff;font-size:14px;
    cursor:pointer;
  }
</style>
</head>
<body>

<div id="checking">Checking access...</div>

<div id="app">
  <h1>🎉 Login Successful!</h1>
  <p>Welcome to Sushi Corp Admin Dashboard</p>
  <p id="who" style="color:#8ea3bd;font-size:13px;margin-top:10px;"></p>
  <button id="logout-btn">Sign Out</button>
</div>

<script>
  // ════════════════════════════════════════════════
  //  🔧 Same Supabase project as admin.html
  // ════════════════════════════════════════════════
  const SUPABASE_URL = "https://hrinbkblrgphhbyetswh.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhyaW5ia2JscmdwaGhieWV0c3doIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3OTg1NDEsImV4cCI6MjA5ODM3NDU0MX0.weKFMYZhXVUZ2Cimf0kHfl8dbo0zPzEmNPBEVD_AZRk";

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  (async function guard(){
    const { data, error } = await sb.auth.getSession();
    if (error || !data.session) {
      // Not logged in — bounce back to the login page immediately
      window.location.href = "admin.html";
      return;
    }
    document.getElementById('checking').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('who').textContent = "Signed in as " + data.session.user.email;
  })();

  // Also react live if the session ends in another tab / expires
  sb.auth.onAuthStateChange((event, session) => {
    if (!session) window.location.href = "admin.html";
  });

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.href = "admin.html";
  });
</script>

</body>
</html>
